<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗管理画面</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .wrap {
      max-width: 720px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .desc {
      color: #666;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    .photo-preview {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 12px;
      background: #eee;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>店舗管理画面</h1>
    <p class="desc">店舗情報と写真を編集できます。</p>

    <label>店名</label>
    <input id="shopName" type="text">

    <label>住所</label>
    <input id="address" type="text">

    <label>営業時間</label>
    <input id="open" type="text">

    <label>定休日</label>
    <input id="closed" type="text">

    <label>メイン写真</label>
    <input id="mainImage" type="file" accept="image/*">
    <img id="preview" class="photo-preview" src="" alt="写真プレビュー">

    <button onclick="savePreview()">保存する</button>

    <p class="note">※現在はテスト版です。次の工程で実際にサイトへ反映できるようにします。</p>
  </div>

  <script>
    fetch('./data/site.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('shopName').value = data.shopName || '';
        document.getElementById('address').value = data.address || '';
        document.getElementById('open').value = data.open || '';
        document.getElementById('closed').value = data.closed || '';

        if (data.mainImage) {
          document.getElementById('preview').src = data.mainImage;
        }
      });

    document.getElementById('mainImage').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        document.getElementById('preview').src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function savePreview() {
      alert('次の工程で、ここから実際にサイトへ保存できるようにします。');
    }
  </script>

</body>
</html>
