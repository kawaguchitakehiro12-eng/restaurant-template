<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店舗管理画面</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 24px;
      color: #222;
    }

    .wrap {
      max-width: 820px;
      margin: auto;
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 { font-size: 26px; margin-bottom: 8px; }
    h2 { font-size: 22px; margin-top: 36px; border-top: 1px solid #eee; padding-top: 28px; }
    h3 { font-size: 18px; margin: 0; }

    .desc { color: #666; margin-bottom: 24px; }

    label {
      display: block;
      font-weight: bold;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .photo-preview {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 12px;
      margin-top: 12px;
      background: #eee;
    }

    .category {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 18px;
      margin-top: 18px;
    }

    .menu-item {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 16px;
      margin-top: 14px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 12px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .sub-button {
      background: #444;
      margin-top: 14px;
    }

    .text-delete {
      width: auto;
      margin-top: 0;
      padding: 0;
      background: none;
      color: #999;
      font-size: 12px;
      font-weight: normal;
      border-radius: 0;
    }

    .category-delete {
      width: auto;
      background: none;
      color: #999;
      font-size: 12px;
      font-weight: normal;
      padding: 0;
      margin-top: 14px;
      border-radius: 0;
    }

    .note {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <h1>店舗管理画面</h1>
    <p class="desc">店舗情報・写真・メニューを編集できます。</p>

    <h2>店舗情報</h2>

    <label>店名</label>
    <input id="shopName" type="text">

    <label>住所</label>
    <input id="address" type="text">

    <label>営業時間</label>
    <input id="open" type="text">

    <label>定休日</label>
    <input id="closed" type="text">

    <label>メイン写真</label>
    <input id="mainImage" type="file" accept="image/*">
    <img id="preview" class="photo-preview" src="" alt="写真プレビュー">

    <h2>メニュー</h2>
    <div id="menuEditor"></div>

    <button class="sub-button" onclick="addCategory()">＋ カテゴリを追加</button>

    <button id="saveButton" onclick="saveData()">保存する</button>
    <div id="status" class="status"></div>

    <p class="note">※保存後、サイト反映まで1〜2分かかる場合があります。</p>
  </div>

  <script>
    const API_URL = "https://lingering-cell-217e.kawaguchitakehiro12.workers.dev";

    let menuData = {
      categories: []
    };

    fetch('./data/site.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('shopName').value = data.shopName || '';
        document.getElementById('address').value = data.address || '';
        document.getElementById('open').value = data.open || '';
        document.getElementById('closed').value = data.closed || '';

        if (data.mainImage) {
          document.getElementById('preview').src = data.mainImage;
        }
      });

    fetch('./data/menu.json')
      .then(res => res.json())
      .then(data => {
        menuData = data;
        renderMenuEditor();
      });

    document.getElementById('mainImage').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        document.getElementById('preview').src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function renderMenuEditor() {
      const editor = document.getElementById('menuEditor');
      editor.innerHTML = '';

      menuData.categories.forEach((category, categoryIndex) => {
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';

        categoryDiv.innerHTML = `
          <label>カテゴリ名</label>
          <input type="text" value="${escapeHtml(category.name || '')}" oninput="updateCategoryName(${categoryIndex}, this.value)">

          <div id="items-${categoryIndex}"></div>

          <button class="sub-button" onclick="addItem(${categoryIndex})">＋ 商品を追加</button>
          <button class="category-delete" onclick="deleteCategory(${categoryIndex})">カテゴリを削除</button>
        `;

        editor.appendChild(categoryDiv);

        const itemsWrap = document.getElementById(`items-${categoryIndex}`);

        category.items.forEach((item, itemIndex) => {
          const itemDiv = document.createElement('div');
          itemDiv.className = 'menu-item';

          itemDiv.innerHTML = `
            <div class="item-head">
              <h3>商品</h3>
              <button class="text-delete" onclick="deleteItem(${categoryIndex}, ${itemIndex})">削除</button>
            </div>

            <label>商品名</label>
            <input type="text" value="${escapeHtml(item.name || '')}" oninput="updateItem(${categoryIndex}, ${itemIndex}, 'name', this.value)">

            <div class="row">
              <div>
                <label>価格</label>
                <input type="text" value="${escapeHtml(item.price || '')}" oninput="updateItem(${categoryIndex}, ${itemIndex}, 'price', this.value)">
              </div>
              <div>
                <label>表示順</label>
                <input type="number" value="${item.order || itemIndex + 1}" oninput="updateItem(${categoryIndex}, ${itemIndex}, 'order', this.value)">
              </div>
            </div>

            <label>説明文</label>
            <textarea oninput="updateItem(${categoryIndex}, ${itemIndex}, 'description', this.value)">${escapeHtml(item.description || '')}</textarea>
          `;

          itemsWrap.appendChild(itemDiv);
        });
      });
    }

    function updateCategoryName(categoryIndex, value) {
      menuData.categories[categoryIndex].name = value;
    }

    function updateItem(categoryIndex, itemIndex, key, value) {
      menuData.categories[categoryIndex].items[itemIndex][key] = value;
    }

    function addCategory() {
      menuData.categories.push({
        name: '新しいカテゴリ',
        items: []
      });
      renderMenuEditor();
    }

    function deleteCategory(categoryIndex) {
      if (!confirm('このカテゴリを削除しますか？')) return;
      menuData.categories.splice(categoryIndex, 1);
      renderMenuEditor();
    }

    function addItem(categoryIndex) {
      menuData.categories[categoryIndex].items.push({
        name: '新しい商品',
        price: '0円',
        description: '',
        order: menuData.categories[categoryIndex].items.length + 1
      });
      renderMenuEditor();
    }

    function deleteItem(categoryIndex, itemIndex) {
      if (!confirm('この商品を削除しますか？')) return;
      menuData.categories[categoryIndex].items.splice(itemIndex, 1);
      renderMenuEditor();
    }

    async function saveData() {
      const status = document.getElementById('status');
      const button = document.getElementById('saveButton');

      const siteData = {
        shopName: document.getElementById('shopName').value,
        address: document.getElementById('address').value,
        open: document.getElementById('open').value,
        closed: document.getElementById('closed').value,
        mainImage: document.getElementById('preview').src || ''
      };

      button.disabled = true;
      button.textContent = '保存中...';
      status.textContent = '';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            siteData,
            menuData
          })
        });

        const result = await res.json();

        if (!res.ok || !result.success) {
          throw new Error(result.error || '保存に失敗しました');
        }

        status.style.color = '#118a35';
        status.textContent = '保存しました。サイト反映まで1〜2分お待ちください。';
      } catch (error) {
        status.style.color = '#b3261e';
        status.textContent = '保存に失敗しました：' + error.message;
      } finally {
        button.disabled = false;
        button.textContent = '保存する';
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('"', '&quot;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }
  </script>


</body>
</html>
