<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>管理画面</title>
</head>
<body>

<h1>店舗情報編集</h1>

<input id="shopName" placeholder="店名"><br>
<input id="address" placeholder="住所"><br>
<input id="open" placeholder="営業時間"><br>
<input id="closed" placeholder="定休日"><br>

<button onclick="save()">保存</button>

<script>
async function save() {
  const data = {
    shopName: document.getElementById('shopName').value,
    address: document.getElementById('address').value,
    open: document.getElementById('open').value,
    closed: document.getElementById('closed').value
  };

  const token = "ここにGitHubトークン";

  const res = await fetch("https://api.github.com/repos/ユーザー名/リポジトリ名/contents/data/site.json", {
    method: "PUT",
    headers: {
      "Authorization": "token " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "update site",
      content: btoa(JSON.stringify(data, null, 2))
    })
  });

  alert("保存しました");
}
</script>

</body>
</html>
