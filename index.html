<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>玄</title>

<style>
:root{
--bg:#fbf8f1;
--paper:#fffdf8;
--ink:#1f1b17;
--muted:#746a5c;
--line:#dfd3bf;
--accent:#9b6b35;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family:"Yu Mincho",YuMincho,Georgia,serif;
background:var(--bg);
color:var(--ink);
line-height:2;
}

a{text-decoration:none;color:inherit;}

nav{
position:fixed;
top:0;left:0;right:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 6vw;
background:rgba(251,248,241,.9);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(0,0,0,.05);
}

.logo{
font-size:15px;
letter-spacing:.22em;
color:var(--accent);
}

.nav{
display:flex;
gap:24px;
font-size:11px;
letter-spacing:.16em;
}

.hero{
min-height:100vh;
display:grid;
grid-template-columns:.95fr 1.05fr;
align-items:center;
gap:6vw;
padding:130px 6vw 90px;
}

.hero-text{
position:relative;
z-index:2;
}

.kicker{
font-size:12px;
letter-spacing:.38em;
color:var(--accent);
margin-bottom:24px;
}

h1{
font-size:clamp(54px,9vw,118px);
font-weight:400;
line-height:1.05;
letter-spacing:-.05em;
margin-bottom:30px;
}

.hero p{
max-width:520px;
color:var(--muted);
}

.hero-image{
width:100%;
height:74vh;
min-height:480px;
object-fit:cover;
border-radius:2px;
box-shadow:0 30px 80px rgba(80,56,30,.16);
}

section{
padding:110px 6vw;
}

.section-head{
display:grid;
grid-template-columns:170px 1fr;
gap:50px;
margin-bottom:54px;
}

.label{
font-size:12px;
letter-spacing:.34em;
color:var(--accent);
}

h2{
font-size:clamp(38px,6vw,76px);
font-weight:400;
line-height:1.16;
letter-spacing:-.04em;
}

.concept-text{
max-width:760px;
margin-left:auto;
color:var(--muted);
font-size:17px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
}

.card{
background:var(--paper);
border:1px solid var(--line);
padding:22px;
}

.card img{
width:100%;
height:260px;
object-fit:cover;
margin-bottom:22px;
}

.card h3{
font-size:28px;
font-weight:400;
margin-bottom:8px;
}

.card p{
color:var(--muted);
}

.price{
margin-top:10px;
color:var(--accent);
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.gallery img{
width:100%;
height:520px;
object-fit:cover;
}

.info{
max-width:760px;
margin-left:auto;
border-top:1px solid var(--line);
}

.row{
display:grid;
grid-template-columns:150px 1fr;
gap:24px;
padding:22px 0;
border-bottom:1px solid var(--line);
}

.row div:first-child{
font-size:12px;
letter-spacing:.18em;
color:var(--accent);
}

.reserve{
background:#efe4d3;
text-align:center;
}

.btn{
display:inline-block;
margin-top:28px;
padding:14px 36px;
border:1px solid var(--accent);
border-radius:999px;
color:var(--accent);
letter-spacing:.16em;
font-size:12px;
}

.btn:hover{
background:var(--accent);
color:#fff;
}

footer{
padding:34px;
text-align:center;
font-size:12px;
color:#9c927f;
}

@media(max-width:800px){
nav{
display:block;
padding:14px 18px;
}

.logo{
margin-bottom:8px;
}

.nav{
overflow-x:auto;
white-space:nowrap;
gap:16px;
font-size:11px;
}

.hero{
grid-template-columns:1fr;
gap:34px;
padding:118px 22px 70px;
}

.hero-image{
order:-1;
height:54vh;
min-height:340px;
}

h1{
font-size:clamp(48px,15vw,82px);
}

section{
padding:76px 22px;
}

.section-head{
grid-template-columns:1fr;
gap:18px;
margin-bottom:34px;
}

.concept-text{
margin-left:0;
font-size:15px;
}

.menu-grid,
.gallery{
grid-template-columns:1fr;
}

.gallery img{
height:320px;
}

.row{
grid-template-columns:1fr;
gap:6px;
}
}
</style>
</head>

<body>

<nav>
<div class="logo" id="shopNameNav">炭火割烹 玄</div>
<div class="nav">
<a href="#top">TOP</a>
<a href="menu.html">MENU</a>
<a href="#access">ACCESS</a>
<a href="#reserve">RESERVE</a>
</div>
</nav>

<header class="hero" id="top">
<div class="hero-text">
<div class="kicker">MODERN IZAKAYA / CHARCOAL / SAKE</div>
<h1 id="heroTitle">季節を炙り、<br>酒を愉しむ。</h1>
<p id="heroText">旬の食材と炭火の香り。肩肘張らずに味わえる、明るい高級和食居酒屋。</p>
</div>

<img id="heroImage" class="hero-image" src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=80&w=1600&auto=format&fit=crop" alt="店舗イメージ">
</header>

<section>
<div class="section-head">
<div class="label">CONCEPT</div>
<h2 id="conceptTitle">日常に、少しだけ上質な和を。</h2>
</div>
<p class="concept-text" id="conceptText"></p>
</section>

<section>
<div class="section-head">
<div class="label">SIGNATURE</div>
<h2 id="recommendTitle">こだわりの一品</h2>
</div>
<div class="menu-grid" id="menuGrid"></div>
</section>

<section>
<div class="section-head">
<div class="label">GALLERY</div>
<h2 id="galleryTitle">店内と料理</h2>
</div>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?q=80&w=1400&auto=format&fit=crop">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=80&w=1400&auto=format&fit=crop">
</div>
</section>

<section id="access">
<div class="section-head">
<div class="label">ACCESS</div>
<h2>店舗情報</h2>
</div>

<div class="info">
<div class="row"><div>ADDRESS</div><div id="address"></div></div>
<div class="row"><div>OPEN</div><div id="open"></div></div>
<div class="row"><div>CLOSED</div><div id="closed"></div></div>
</div>
</section>

<section class="reserve" id="reserve">
<div class="label">RESERVATION</div>
<h2 id="reserveTitle">ご予約はこちら</h2>
<a id="lineBtn" class="btn">LINE予約</a>
</section>

<footer>© <span id="footerShopName">炭火割烹 玄</span></footer>

<script>
fetch('./data/site.json')
.then(res=>res.json())
.then(data=>{
const shopName=data.shopName||"炭火割烹 玄";
document.title=shopName;
document.getElementById("shopNameNav").textContent=shopName;
document.getElementById("footerShopName").textContent=shopName;

document.getElementById("heroTitle").innerHTML=(data.hero?.title||"").replace(/\n/g,"<br>");
document.getElementById("heroText").textContent=data.hero?.text||"";

if(data.hero?.image){
document.getElementById("heroImage").src=data.hero.image;
}

document.getElementById("conceptTitle").textContent=data.concept?.title||"";
document.getElementById("conceptText").textContent=data.concept?.text||"";
document.getElementById("recommendTitle").textContent=data.recommend?.title||"";
document.getElementById("galleryTitle").textContent=data.gallery?.title||"";

document.getElementById("address").textContent=data.access?.address||"";
document.getElementById("open").textContent=data.access?.open||"";
document.getElementById("closed").textContent=data.access?.closed||"";
document.getElementById("reserveTitle").textContent=data.reserve?.title||"";

const lineBtn=document.getElementById("lineBtn");
if(data.reserve?.lineUrl){lineBtn.href=data.reserve.lineUrl;}else{lineBtn.style.display="none";}
});

fetch('./data/menu.json')
.then(res=>res.json())
.then(data=>{
const grid=document.getElementById("menuGrid");
grid.innerHTML="";
const items=data.categories?.[0]?.items||[];
items.sort((a,b)=>(a.order||0)-(b.order||0));

const defaultImages=[
"https://images.unsplash.com/photo-1617196034796-73dfa7b1fd56?q=80&w=1200",
"https://images.unsplash.com/photo-1600891964599-f61ba0e24092?q=80&w=1200",
"https://images.unsplash.com/photo-1569058242253-92a9c755a0ec?q=80&w=1200"
];

items.slice(0,3).forEach((item,index)=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${item.image||defaultImages[index%defaultImages.length]}" alt="${item.name||""}">
<h3>${item.name||""}</h3>
<p>${item.description||""}</p>
<div class="price">${item.price||""}</div>
`;
grid.appendChild(div);
});
});
</script>

</body>
</html>
