<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NOIR CAFE</title>

<style>
:root{
--bg:#f7f3ec;
--text:#1f1f1d;
--muted:#6f6a61;
--line:#ddd4c7;
--accent:#9b7a4e;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family: Georgia,"Yu Mincho",serif;
background:var(--bg);
color:var(--text);
line-height:1.9;
}

a{text-decoration:none;color:inherit;}

nav{
position:fixed;
top:0;left:0;right:0;
z-index:100;
display:flex;
justify-content:space-between;
padding:18px 5vw;
background:rgba(247,243,236,.9);
backdrop-filter:blur(10px);
}

.logo{
font-size:14px;
letter-spacing:.14em;
}

.nav{
display:flex;
gap:18px;
font-size:11px;
}

.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 5vw;
background-size:cover;
background-position:center;
}

.hero-inner{
max-width:700px;
background:rgba(247,243,236,.55);
padding:28px;
}

h1{
font-size:clamp(48px,8vw,100px);
font-weight:400;
margin-bottom:20px;
line-height:1.1;
}

p{color:var(--muted);}

section{
padding:80px 5vw;
}

h2{
font-size:clamp(34px,5vw,64px);
font-weight:400;
margin-bottom:24px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:40px;
}

.card{
background:#fff;
padding:20px;
border:1px solid var(--line);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
margin-bottom:16px;
background:#e5ded2;
}

.card h3{
font-size:24px;
font-weight:400;
margin-bottom:8px;
}

.price{
margin-top:8px;
color:var(--accent);
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
}

.info{margin-top:30px;}

.row{
display:flex;
justify-content:space-between;
border-bottom:1px solid var(--line);
padding:15px 0;
gap:20px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 24px;
border:1px solid #000;
}

footer{
padding:30px;
text-align:center;
font-size:12px;
color:#999;
}

@media(max-width:800px){
nav{
display:block;
padding:14px 18px;
}

.logo{margin-bottom:8px;}

.nav{
overflow-x:auto;
white-space:nowrap;
gap:14px;
}

.menu-grid{grid-template-columns:1fr;}
.gallery{grid-template-columns:1fr;}
.hero{height:80vh;padding:0 20px;}
section{padding:70px 20px;}

.row{
display:block;
}

.card img{
height:240px;
}
}
</style>
</head>

<body>

<nav>
<div class="logo" id="shopNameNav">NOIR CAFE</div>
<div class="nav">
<a href="#top">TOP</a>
<a href="menu.html">MENU</a>
<a href="#access">ACCESS</a>
<a href="#reserve">RESERVE</a>
</div>
</nav>

<section class="hero" id="top">
<div class="hero-inner">
<h1 id="heroTitle">タイトル</h1>
<p id="heroText">説明文</p>
</div>
</section>

<section>
<h2 id="conceptTitle">コンセプト</h2>
<p id="conceptText"></p>
</section>

<section>
<h2 id="recommendTitle">おすすめ</h2>
<div class="menu-grid" id="menuGrid"></div>
</section>

<section>
<h2 id="galleryTitle">ギャラリー</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1442512595331-e89e73853f31?q=80&w=1200">
<img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1200">
</div>
</section>

<section id="access">
<h2>店舗情報</h2>

<div class="info">
<div class="row">
<div>住所</div>
<div id="address"></div>
</div>

<div class="row">
<div>営業時間</div>
<div id="open"></div>
</div>

<div class="row">
<div>定休日</div>
<div id="closed"></div>
</div>
</div>
</section>

<section id="reserve">
<h2 id="reserveTitle">予約</h2>
<a id="lineBtn" class="btn">LINE予約</a>
</section>

<footer>
© <span id="footerShopName">NOIR CAFE</span>
</footer>

<script>
fetch('./data/site.json')
.then(res => res.json())
.then(data => {
const shopName = data.shopName || "NOIR CAFE";

document.title = shopName;
document.getElementById("shopNameNav").textContent = shopName;
document.getElementById("footerShopName").textContent = shopName;

document.getElementById("heroTitle").textContent = data.hero?.title || "";
document.getElementById("heroText").textContent = data.hero?.text || "";

const hero = document.querySelector(".hero");
hero.style.backgroundImage = data.hero?.image
? `url("${data.hero.image}")`
: `url("https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=1600")`;

document.getElementById("conceptTitle").textContent = data.concept?.title || "";
document.getElementById("conceptText").textContent = data.concept?.text || "";

document.getElementById("recommendTitle").textContent = data.recommend?.title || "";
document.getElementById("galleryTitle").textContent = data.gallery?.title || "";
document.getElementById("reserveTitle").textContent = data.reserve?.title || "";

document.getElementById("address").textContent = data.access?.address || "";
document.getElementById("open").textContent = data.access?.open || "";
document.getElementById("closed").textContent = data.access?.closed || "";

const lineBtn = document.getElementById("lineBtn");
if(data.reserve?.lineUrl){
lineBtn.href = data.reserve.lineUrl;
} else {
lineBtn.style.display = "none";
}
});

fetch('./data/menu.json')
.then(res => res.json())
.then(data => {
const grid = document.getElementById("menuGrid");
grid.innerHTML = "";

const items = data.categories?.[0]?.items || [];

items.sort((a,b)=> (a.order||0)-(b.order||0));

const defaultImages = [
"https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1200",
"https://images.unsplash.com/photo-1461023058943-07fcbe16d735?q=80&w=1200",
"https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=1200"
];

items.slice(0,3).forEach((item,index)=>{
const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<img src="${item.image || defaultImages[index % defaultImages.length]}" alt="${item.name || ""}">
<h3>${item.name || ""}</h3>
<p>${item.description || ""}</p>
<p class="price">${item.price || ""}</p>
`;

grid.appendChild(div);
});
});
</script>

</body>
</html>
